<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle with subtle gradient -->
  <defs>
    <linearGradient id="skinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F8E1C4"/>
      <stop offset="100%" stop-color="#F0D2B0"/>
    </linearGradient>
    <linearGradient id="hijabGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3A4E6B"/>
      <stop offset="100%" stop-color="#1F2E44"/>
    </linearGradient>
  </defs>

  <!-- Soft skin base -->
  <circle cx="100" cy="100" r="96" fill="url(#skinGradient)" stroke="#C1A06B" stroke-width="2"/>

  <!-- Hijab (normal drape, no extra shadows or folds) -->
  <path d="M45 70 Q100 25 155 70 L155 140 Q100 175 45 140 L45 70" fill="url(#hijabGradient)"/>

  <!-- Face -->
  <ellipse cx="100" cy="108" rx="30" ry="36" fill="#F5DCC4"/>

  <!-- Eyebrows -->
  <path d="M70 90 Q80 84 90 90" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M110 90 Q120 84 130 90" stroke="#2C3E50" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Eyes with highlights -->
  <circle cx="80" cy="104" r="5" fill="#2C3E50"/>
  <circle cx="120" cy="104" r="5" fill="#2C3E50"/>
  <circle cx="78" cy="101" r="1.5" fill="white"/>
  <circle cx="118" cy="101" r="1.5" fill="white"/>

  <!-- Nose -->
  <path d="M100 112 L103 120 L97 120 Z" fill="#C9A787"/>

  <!-- Lips -->
  <path d="M90 126 Q100 134 110 126" stroke="#B0586F" stroke-width="2.8" fill="none" stroke-linecap="round"/>

  <!-- Blush -->
  <circle cx="75" cy="116" r="6" fill="#F4A3A3" opacity="0.3"/>
  <circle cx="125" cy="116" r="6" fill="#F4A3A3" opacity="0.3"/>
</svg>